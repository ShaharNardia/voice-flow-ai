name: Comprehensive Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: tests/api_tests
        run: npm install
      
      - name: Run API tests
        working-directory: tests/api_tests
        env:
          FIREBASE_FUNCTIONS_URL: ${{ secrets.FIREBASE_FUNCTIONS_URL }}
        run: npm test
      
      - name: Run edge case tests
        working-directory: tests/api_tests
        env:
          FIREBASE_FUNCTIONS_URL: ${{ secrets.FIREBASE_FUNCTIONS_URL }}
        run: npm run test:edge-cases
      
      - name: Run integration tests
        working-directory: tests/api_tests
        env:
          FIREBASE_FUNCTIONS_URL: ${{ secrets.FIREBASE_FUNCTIONS_URL }}
        run: npm run test:integration
      
      - name: Run security tests
        working-directory: tests/api_tests
        env:
          FIREBASE_FUNCTIONS_URL: ${{ secrets.FIREBASE_FUNCTIONS_URL }}
        run: npm run test:security

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Playwright
        working-directory: tests/ui
        run: |
          npm install
          npx playwright install --with-deps
      
      - name: Run UI tests
        working-directory: tests/ui
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          QA_EMAIL: ${{ secrets.QA_EMAIL }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: npx playwright test
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 30

  flutter-tests:
    name: Flutter Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run Flutter integration tests
        run: flutter test integration_test/
      
      - name: Run Flutter analyze
        run: flutter analyze

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: tests/api_tests
        run: npm install
      
      - name: Run performance tests
        working-directory: tests/api_tests
        env:
          FIREBASE_FUNCTIONS_URL: ${{ secrets.FIREBASE_FUNCTIONS_URL }}
        run: npm run test:performance

