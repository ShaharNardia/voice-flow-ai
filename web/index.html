  <!-- Firebase Error Handling -->
  <script>
    // Override Firebase error logging to handle internal assertion failures gracefully
    if (typeof firebase !== 'undefined') {
      const originalLog = console.error;
      console.error = function(...args) {
        const message = args.join(' ');
        if (message.includes('FIRESTORE') && message.includes('INTERNAL ASSERTION FAILED')) {
          console.warn('Firebase Firestore internal assertion handled gracefully:', message);
          return;
        }
        originalLog.apply(console, args);
      };
    }
  </script>
